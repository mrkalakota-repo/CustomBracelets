<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Texture -->
    <filter id="speckle" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="3" result="noise" />
      <feDiffuseLighting in="noise" lighting-color="#F5F0E8" surfaceScale="1">
        <feDistantLight azimuth="45" elevation="60" />
      </feDiffuseLighting>
    </filter>

    <!-- Metallic Gold for Charm -->
    <linearGradient id="goldLuster" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>

    <!-- Ambient Shadow -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="2" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="400" height="400" fill="#F5F0E8" />
  <rect width="400" height="400" filter="url(#speckle)" opacity="0.4" />

  <!-- Bracelet Layer -->
  <g filter="url(#softShadow)" transform="translate(200,200) rotate(-10)">
    <!-- Fine Chain Loop -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="4 2" />

    <!-- Rose/Flower Charm -->
    <g transform="translate(0, 110) scale(1.5)">
      <circle r="8" fill="url(#goldLuster)" />
      <!-- Petals -->
      <ellipse rx="12" ry="6" cx="0" cy="-8" fill="url(#goldLuster)" />
      <ellipse rx="12" ry="6" cx="0" cy="8" fill="url(#goldLuster)" />
      <ellipse rx="6" ry="12" cx="-8" cy="0" fill="url(#goldLuster)" />
      <ellipse rx="6" ry="12" cx="8" cy="0" fill="url(#goldLuster)" />
    </g>
  </g>
</svg>