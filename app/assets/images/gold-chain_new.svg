<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Speckle/Stone Texture -->
    <filter id="stoneTexture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="3" result="noise" />
      <feDiffuseLighting in="noise" lighting-color="#F5F0E8" surfaceScale="1">
        <feDistantLight azimuth="45" elevation="65" />
      </feDiffuseLighting>
    </filter>

    <!-- Metallic Gold Multi-stop Gradient -->
    <linearGradient id="goldReflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="20%" stop-color="#D97706" />
      <stop offset="40%" stop-color="#FEF3C7" />
      <stop offset="60%" stop-color="#B45309" />
      <stop offset="80%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#92400E" />
    </linearGradient>

    <!-- Specular Highlight for Metal -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <!-- Ambient Shadow -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="400" height="400" fill="#F5F0E8" />
  <rect width="400" height="400" filter="url(#stoneTexture)" opacity="0.3" />

  <!-- Chain Layer -->
  <g filter="url(#softShadow)" transform="translate(200,200) rotate(5)">
    <!-- Interlocking Links -->
    <g>
      <!-- Loop 16 links -->
      <g transform="rotate(0) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(22.5) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(45) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(67.5) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(90) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(112.5) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(135) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(157.5) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(180) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(202.5) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(225) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(247.5) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(270) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(292.5) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(315) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
      <g transform="rotate(337.5) translate(110,0) rotate(90)">
        <ellipse rx="10" ry="16" fill="none" stroke="url(#goldReflect)" stroke-width="3" />
        <ellipse rx="5" ry="10" cx="0" cy="-2" fill="none" stroke="url(#shine)" stroke-width="1" />
      </g>
    </g>
  </g>
</svg>