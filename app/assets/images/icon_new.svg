<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand Colors -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F0E8" />
      <stop offset="100%" stop-color="#E5E0D8" />
    </linearGradient>

    <linearGradient id="goldLuster" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>

    <!-- Soft Ambient Shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="5" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer (Full Square for App Icon) -->
  <rect width="1024" height="1024" fill="url(#bgGrad)" />

  <!-- Centered Logo Element (The Bracelet Icon) -->
  <g filter="url(#softShadow)" transform="translate(512, 512)">
    <!-- Matte Sage Beads -->
    <circle cx="0" cy="-280" r="45" fill="#8FAF8A" />
    <circle cx="110" cy="-260" r="45" fill="#8FAF8A" />
    <circle cx="200" cy="-200" r="45" fill="#8FAF8A" />
    <circle cx="260" cy="-110" r="45" fill="#8FAF8A" />
    <circle cx="280" cy="0" r="45" fill="#8FAF8A" />
    <circle cx="260" cy="110" r="45" fill="#8FAF8A" />
    <circle cx="200" cy="200" r="45" fill="#8FAF8A" />
    <circle cx="110" cy="260" r="45" fill="#8FAF8A" />
    <circle cx="0" cy="280" r="45" fill="#8FAF8A" />
    <circle cx="-110" cy="260" r="45" fill="#8FAF8A" />
    <circle cx="-200" cy="200" r="45" fill="#8FAF8A" />
    <circle cx="-260" cy="110" r="45" fill="#8FAF8A" />
    <circle cx="-280" cy="0" r="45" fill="#8FAF8A" />
    <circle cx="-260" cy="-110" r="45" fill="#8FAF8A" />
    <circle cx="-200" cy="-200" r="45" fill="#8FAF8A" />
    <circle cx="-110" cy="-260" r="45" fill="#8FAF8A" />

    <!-- Center Charm (Heart) -->
    <path d="M0,45 L-35,0 A20,20 0 0,1 0,-20 A20,20 0 0,1 35,0 Z"
          transform="scale(2.5)"
          fill="url(#goldLuster)" />
  </g>
</svg>