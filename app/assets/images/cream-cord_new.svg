<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Texture -->
    <filter id="speckle" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="3" result="noise" />
      <feDiffuseLighting in="noise" lighting-color="#F5F0E8" surfaceScale="1">
        <feDistantLight azimuth="45" elevation="60" />
      </feDiffuseLighting>
    </filter>

    <!-- Metallic Gold for Heart & Beads -->
    <linearGradient id="goldLuster" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>

    <!-- Braided Cord Texture -->
    <pattern id="braid" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0,5 Q5,0 10,5 Q5,10 0,5" fill="none" stroke="#E5E0D8" stroke-width="1.5" />
    </pattern>

    <!-- Ambient Shadow -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="2" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="400" height="400" fill="#F5F0E8" />
  <rect width="400" height="400" filter="url(#speckle)" opacity="0.4" />

  <!-- Bracelet Layer -->
  <g filter="url(#softShadow)" transform="translate(200,200) rotate(-10)">
    <!-- Braided Loop -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#F5F0E8" stroke-width="10" />
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#braid)" stroke-width="10" />

    <!-- Heart Charm (Centerpiece) -->
    <path d="M0,12 L-10,0 A5,5 0 0,1 0,-5 A5,5 0 0,1 10,0 Z"
          transform="translate(0, 110) scale(1.8)"
          fill="url(#goldLuster)" />

    <!-- Adjustable Knots -->
    <rect x="-20" y="-120" width="40" height="12" rx="6" fill="#E5E0D8" />

    <!-- Dangling Beads -->
    <circle cx="-60" cy="-140" r="5" fill="url(#goldLuster)" />
    <circle cx="60" cy="-140" r="5" fill="url(#goldLuster)" />
  </g>
</svg>